<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VexFS Telemetry Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0c10;
            --panel-bg: rgba(31, 33, 44, 0.6);
            --border-color: rgba(255, 255, 255, 0.1);
            --primary: #45f3ff;
            --critical: #ff2a55;
            --text-main: #e0e6ed;
            --text-muted: #8b9bb4;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 2rem;
            min-height: 100vh;
            background-image: radial-gradient(circle at 50% 0%, rgba(69, 243, 255, 0.1) 0%, transparent 60%);
        }

        .dashboard {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            margin: 0;
            font-weight: 700;
            letter-spacing: -0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .header h1 i {
            color: var(--primary);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .card {
            background: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.5rem;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            transition: transform 0.2s ease, border-color 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-2px);
            border-color: rgba(69, 243, 255, 0.3);
        }

        .card h3 {
            margin: 0 0 1rem 0;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .stat-value {
            font-size: 2.5rem;
            font-weight: 700;
            margin: 0;
        }
        
        .stat-label {
            font-size: 0.9rem;
            color: var(--text-muted);
            margin-top: 5px;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: rgba(255,255,255,0.1);
            border-radius: 4px;
            margin-top: 15px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), #00ff88);
            border-radius: 4px;
            transition: width 0.3s ease;
        }

        .threat-alert {
            animation: pulse-border 2s infinite;
        }
        
        .threat-alert .stat-value {
            color: var(--critical);
        }

        .tier-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .tier-list li {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        
        .tier-list li:last-child {
            border-bottom: none;
        }

        .tier-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .tier-hot { background: rgba(255, 69, 58, 0.2); color: #ff453a; }
        .tier-warm { background: rgba(255, 159, 10, 0.2); color: #ff9f0a; }
        .tier-cold { background: rgba(100, 210, 255, 0.2); color: #64d2ff; }

        @keyframes pulse-border {
            0% { box-shadow: 0 0 0 0 rgba(255, 42, 85, 0.4); border-color: rgba(255, 42, 85, 0.6); }
            70% { box-shadow: 0 0 0 10px rgba(255, 42, 85, 0); border-color: rgba(255, 42, 85, 0.1); }
            100% { box-shadow: 0 0 0 0 rgba(255, 42, 85, 0); }
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="header">
            <h1><i class="fa-solid fa-microchip"></i> VexFS UI</h1>
            <div id="status-indicator" style="color: #00ff88;"><i class="fa-solid fa-circle-dot"></i> Live</div>
        </div>

        <div class="grid">
            <div class="card">
                <h3><i class="fa-solid fa-database"></i> ARC Cache</h3>
                <div class="stat-value" id="cache-used">0 MB</div>
                <div class="stat-label">of <span id="cache-max">0</span> MB total</div>
                <div class="progress-bar">
                    <div class="progress-fill" id="cache-progress" style="width: 0%"></div>
                </div>
            </div>

            <div class="card" id="threat-card">
                <h3><i class="fa-solid fa-shield-halved"></i> Entropy Guard</h3>
                <div class="stat-value" id="threats-count">0</div>
                <div class="stat-label">Ransomware threats blocked</div>
            </div>
            
            <div class="card">
                <h3><i class="fa-solid fa-brain"></i> AI Metrics</h3>
                <div style="display: flex; justify-content: space-between; margin-top: 10px;">
                    <div>
                        <div class="stat-value" id="markov-count" style="font-size: 1.8rem">0</div>
                        <div class="stat-label">Markov Entries</div>
                    </div>
                    <div>
                        <div class="stat-value" id="search-count" style="font-size: 1.8rem">0</div>
                        <div class="stat-label">Indexed Files</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="card" style="margin-bottom: 2rem;">
            <h3><i class="fa-solid fa-fire"></i> Importance Tier List</h3>
            <ul class="tier-list" id="tier-list">
                <!-- Dynamically populated -->
                <li><span style="color: var(--text-muted)">Awaiting telemetry...</span></li>
            </ul>
        </div>
    </div>

    <script>
        function formatSize(bytes) {
            if (bytes === 0) return '0 MB';
            const k = 1024;
            const mb = bytes / (k * k);
            return mb.toFixed(1) + ' MB';
        }

        async function updateTelemetry() {
            try {
                const response = await fetch('/api/telemetry');
                if (!response.ok) throw new Error('API unavailable');
                const data = await response.json();

                document.getElementById('status-indicator').style.color = '#00ff88';

                // Update Cache
                document.getElementById('cache-used').innerText = formatSize(data.cache_used);
                document.getElementById('cache-max').innerText = (data.cache_max / (1024*1024)).toFixed(0);
                const cachePct = Math.min(100, Math.max(0, (data.cache_used / data.cache_max) * 100));
                document.getElementById('cache-progress').style.width = cachePct + '%';

                // Update Threats
                const threatsCount = document.getElementById('threats-count');
                const threatCard = document.getElementById('threat-card');
                if (data.entropy_threats > 0) {
                    threatCard.classList.add('threat-alert');
                } else {
                    threatCard.classList.remove('threat-alert');
                }
                threatsCount.innerText = data.entropy_threats;

                // Update AI stats
                document.getElementById('markov-count').innerText = data.markov_entries;
                document.getElementById('search-count').innerText = data.search_indexed;

                // Update Tiers
                const tierList = document.getElementById('tier-list');
                tierList.innerHTML = '';
                if (data.ranked_files && data.ranked_files.length > 0) {
                    data.ranked_files.forEach(file => {
                        const li = document.createElement('li');
                        let tierClass = 'tier-cold';
                        if (file.tier === 'HOT') tierClass = 'tier-hot';
                        if (file.tier === 'WARM') tierClass = 'tier-warm';
                        
                        li.innerHTML = `
                            <span><i class="fa-regular fa-file"></i> &nbsp; ${file.name}</span>
                            <div>
                                <span style="color: var(--text-muted); font-size: 0.8rem; margin-right: 15px;">Score: ${file.score.toFixed(2)}</span>
                                <span class="tier-badge ${tierClass}">${file.tier}</span>
                            </div>
                        `;
                        tierList.appendChild(li);
                    });
                } else {
                    tierList.innerHTML = '<li><span style="color: var(--text-muted)">No files indexed yet</span></li>';
                }

            } catch (err) {
                console.error(err);
                document.getElementById('status-indicator').style.color = 'var(--text-muted)';
            }
        }

        // Poll every 1 second
        setInterval(updateTelemetry, 1000);
        updateTelemetry();
    </script>
</body>
</html>
